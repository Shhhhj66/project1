<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 问答助手</title>
  <style>
    body {
      max-width: 600px;
      margin: 30px auto;
      padding: 0 20px;
      font-family: Arial, sans-serif;
    }
    .title {
      text-align: center;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .info {
      text-align: center;
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }
    .chat-box {
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 8px;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 15px;
      background: #fafafa;
    }
    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
      max-width: 80%;
      word-wrap: break-word;
    }
    .user {
      background: #d3eafd;
      margin-left: auto;
      text-align: right;
    }
    .bot {
      background: #f1f1f1;
      margin-right: auto;
      text-align: left;
    }
    .input-area {
      display: flex;
      gap: 8px;
    }
    #input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    #sendBtn {
      padding: 10px 16px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
    <h1>AI 智能问答系统</h1>
    <p>学号：202335020536 姓名：沈豪杰</p>
    
    <div id="chat-container" style="width:80%; margin:0 auto; border:1px solid #ccc; padding:20px; height:400px; overflow-y:auto;">
        <!-- 消息会显示在这里 -->
    </div>
    
    <div style="width:80%; margin:10px auto;">
        <input type="text" id="input-box" placeholder="请输入问题..." style="width:80%; padding:8px;">
        <button id="send-btn" style="padding:8px 16px;">发送</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
